name: MediReminder
options:
  bundleIdPrefix: com.medireminder
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 11.0.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: MediReminder/Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    DEVELOPMENT_TEAM: ""

targets:
  MediReminder:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MediReminder
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medireminder.app
        INFOPLIST_FILE: MediReminder/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
    info:
      path: MediReminder/Resources/Info.plist
      properties:
        UILaunchScreen: {}

  MediReminderTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MediReminderTests
    dependencies:
      - target: MediReminder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medireminder.tests
